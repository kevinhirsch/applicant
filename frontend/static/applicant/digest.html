<!DOCTYPE html>
<!--
  Applicant — daily digest and the things waiting for your input. Features that
  aren't available yet are shown grayed out so nothing looks active when it isn't.
  Reuses the shared Odysseus design system.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Applicant — Daily digest</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/applicant/applicant.css" />
</head>
<body data-campaign-id="">
  <main>
    <section class="admin-card applicant-section" id="digest-section">
      <h1>Daily digest</h1>
      <p class="admin-empty" id="digest-empty-note" hidden></p>
      <table class="admin-card" style="width:100%;" id="digest-table">
        <thead>
          <tr>
            <th>Role</th><th>Work mode</th><th>Score</th><th>Why suggested</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="digest-rows">
          <tr><td colspan="5" class="admin-empty">Loading…</td></tr>
        </tbody>
      </table>
    </section>

    <section class="admin-card applicant-section" id="pending-section">
      <h2>Waiting for you</h2>
      <p class="admin-empty">Everything across your search that's waiting on your input.</p>
      <ul id="pending-list"><li class="admin-empty">Loading…</li></ul>
    </section>

    <!-- Not available yet: document review -->
    <section class="admin-card applicant-section applicant-dormant" aria-disabled="true">
      <h2>Document review <span class="admin-badge admin-badge-off">coming soon</span></h2>
      <p class="admin-empty">Review and revise resumes and cover letters before they go out — coming soon.</p>
    </section>
  </main>
  <script type="module" src="/static/applicant/js/digest.js"></script>
</body>
</html>
