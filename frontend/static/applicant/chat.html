<!DOCTYPE html>
<!--
  Applicant — Assistant chatbot surface (FR-CHAT-1, FR-FB-2/3, FR-UI-6).

  A conversational surface that assists the user in providing input, identifies
  gaps in the attribute cloud / criteria, and proposes attribute/criteria updates.
  Integral/sensitive proposals are confirmation-gated (FR-FB-3): the surface shows
  a Confirm control and never commits an integral change without it. Backed by
  /api/chat (LLM-degrading-gracefully + attribute/criteria services). Reuses the
  vendored Odysseus style.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Applicant — Assistant</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="applicant.css" />
</head>
<body data-campaign-id="">
  <main>
    <section class="admin-card applicant-section" id="chat-section">
      <h1>Assistant <span class="admin-badge admin-badge-on">Phase 4 — live</span></h1>
      <p class="admin-empty">
        Tell me about yourself or your search. I will flag gaps and propose updates;
        anything integral I will confirm with you before it commits (FR-FB-3).
      </p>
      <div id="chat-gaps" class="admin-empty"></div>
      <div id="chat-log" class="chat-log"></div>
      <form id="chat-form" class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off" />
        <button class="admin-btn" type="submit">Send</button>
      </form>
    </section>
  </main>
  <script type="module" src="./js/chat.js"></script>
</body>
</html>
