<!DOCTYPE html>
<!--
  Applicant — assistant. A chat that helps you fill in your details, points out
  what's missing, and suggests updates to your details and search criteria.
  Important suggestions are confirmed with you before anything is saved.
  Reuses the shared Applicant design system.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Applicant — Assistant</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/applicant/applicant.css" />
</head>
<body data-campaign-id="">
  <main>
    <section class="admin-card applicant-section" id="chat-section">
      <h1>Assistant</h1>
      <p class="admin-empty">
        Tell me about yourself or your search. I'll point out anything that's
        missing and suggest updates — anything important I'll confirm with you
        before saving it.
      </p>
      <div id="chat-gaps" class="admin-empty"></div>
      <div id="chat-log" class="chat-log"></div>
      <form id="chat-form" class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off" />
        <button class="admin-btn" type="submit">Send</button>
      </form>
    </section>
  </main>
  <script type="module" src="/static/applicant/js/chat.js"></script>
</body>
</html>
