<!DOCTYPE html>
<!--
  Applicant — your details. The answers used to pre-fill your applications,
  shown in plain language and editable any time. Learned or AI-suggested values
  are shown and can be overridden. Some fields ask for confirmation before
  saving, and equal-opportunity fields are never auto-filled.
  Reuses the shared Odysseus design system.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Applicant — Your details</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/applicant/applicant.css" />
</head>
<body data-campaign-id="">
  <div id="applicant-nav"></div>
  <main>
    <section class="admin-card applicant-section" id="attributes-section">
      <h1>Your details</h1>
      <p class="admin-empty">
        The answers used to pre-fill your applications. Edit them any time —
        learned and AI-suggested values are shown and you can override any of them.
      </p>
      <table class="admin-card" style="width:100%;" id="attributes-table">
        <thead>
          <tr><th>Name</th><th>Value</th><th>Flags</th></tr>
        </thead>
        <tbody id="attributes-rows"><tr><td colspan="3" class="admin-empty">Loading…</td></tr></tbody>
      </table>
    </section>

    <section class="admin-card applicant-section" id="add-attribute-section">
      <h2>Add or update a detail</h2>
      <form id="attribute-form" class="applicant-form">
        <label>Name<input id="a-name" type="text" required /></label>
        <label>Value<input id="a-value" type="text" required /></label>
        <label class="applicant-inline"
               title="Changes to these fields ask for your confirmation before they're saved.">
          <input id="a-integral" type="checkbox" /> Important field
        </label>
        <label class="applicant-inline"
               title="Equal-opportunity fields are never auto-filled and default to 'decline to self-identify'.">
          <input id="a-sensitive" type="checkbox" /> Equal-opportunity field
        </label>
        <button class="admin-btn" id="a-save" type="submit">Save detail</button>
      </form>
      <p class="admin-empty applicant-note" id="attributes-status" hidden></p>
    </section>
  </main>
  <script type="module" src="/static/applicant/js/attributes.js"></script>
</body>
</html>
