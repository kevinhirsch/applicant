name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false  # checkout creds aren't needed; no step pushes back (#167)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: Front-end syntax check (node --check)
        run: |
          set -e
          for f in $(git ls-files | grep '^static/.*\.js$'); do
            node --check "$f"
          done

      - name: Run tests
        run: |
          python -m pytest -q
