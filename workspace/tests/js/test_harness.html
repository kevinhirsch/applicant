<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Front-Door JS Test Harness</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { color: #89b4fa; border-bottom: 1px solid #45475a; padding-bottom: 0.5rem; }
    h2 { color: #a6e3a1; font-size: 1.1rem; margin-top: 1.5rem; }
    #results { margin-top: 1rem; }
    .suite { margin-bottom: 1rem; }
    .suite-name { font-weight: 600; color: #f5c2e7; margin-bottom: 0.25rem; }
    .test-pass { color: #a6e3a1; }
    .test-fail { color: #f38ba8; }
    .test-skip { color: #fab387; }
    .test-line { padding: 0.1rem 0.5rem; font-family: monospace; font-size: 0.85rem; }
    .test-line .icon { display: inline-block; width: 1.2rem; }
    #summary {
      margin-top: 1.5rem;
      padding: 0.75rem;
      border-radius: 6px;
      font-weight: 600;
      text-align: center;
    }
    #summary.pass { background: #a6e3a120; color: #a6e3a1; }
    #summary.fail { background: #f38ba820; color: #f38ba8; }
    .error-detail {
      margin: 0.25rem 0 0.25rem 1.5rem;
      padding: 0.25rem 0.5rem;
      background: #313244;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      color: #fab387;
    }
    #log {
      margin-top: 1rem;
      padding: 0.5rem;
      background: #11111b;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.8rem;
      max-height: 200px;
      overflow-y: auto;
    }
    #log .log-entry { color: #6c7086; }
  </style>
</head>
<body>
  <h1>Front-Door JS Test Harness</h1>
  <p>Loading ES modules and running smoke tests…</p>

  <div id="results"></div>
  <div id="summary">Running…</div>
  <div id="log"></div>

  <!-- Test runner module -->
  <script type="module">
    import { runAllSuites } from './runner.js';

    const resultsEl = document.getElementById('results');
    const summaryEl = document.getElementById('summary');
    const logEl = document.getElementById('log');

    function log(msg) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = `[${new Date().toISOString().slice(11,19)}] ${msg}`;
      logEl.appendChild(entry);
    }

    window.__testLog = log;

    async function main() {
      log('Test harness started');
      try {
        const result = await runAllSuites();
        log(`All suites completed: ${result.passed}/${result.total} passed`);

        // Render results
        for (const suite of result.suites) {
          const suiteEl = document.createElement('div');
          suiteEl.className = 'suite';
          const nameEl = document.createElement('div');
          nameEl.className = 'suite-name';
          nameEl.textContent = suite.name;
          suiteEl.appendChild(nameEl);

          for (const t of suite.tests) {
            const line = document.createElement('div');
            line.className = `test-line test-${t.status}`;
            const icon = document.createElement('span');
            icon.className = 'icon';
            icon.textContent = t.status === 'pass' ? '✓' : t.status === 'fail' ? '✗' : '–';
            line.appendChild(icon);
            line.appendChild(document.createTextNode(t.name));
            suiteEl.appendChild(line);

            if (t.error) {
              const err = document.createElement('div');
              err.className = 'error-detail';
              err.textContent = t.error;
              suiteEl.appendChild(err);
            }
          }
          resultsEl.appendChild(suiteEl);
        }

        summaryEl.textContent = `${result.passed}/${result.total} tests passed`;
        summaryEl.className = result.passed === result.total ? 'pass' : 'fail';
        log(result.passed === result.total ? 'All tests passed!' : `${result.total - result.passed} test(s) failed`);
      } catch (err) {
        summaryEl.textContent = `Harness error: ${err.message}`;
        summaryEl.className = 'fail';
        log(`Fatal: ${err.message}`);
        log(err.stack);
      }
    }

    main();
  </script>
</body>
</html>
