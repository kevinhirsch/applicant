name: Integration Lane (NFR-OPS-1)

# Staged integration lane: runs the @pytest.mark.integration suite with real
# dependencies (Postgres, TeX, LibreOffice, a real browser stack) and
# optionally a live ATS dry-run, live discovery-board coverage, and the P1-7
# backup/restore/destroy drill. Never performs a real final submit — the
# engine's review-before-submit gate stops all pre-fill runs at the review
# boundary, and the destroy drill only ever touches its own throwaway
# docker-compose project, never a deployed stack.
#
# Triggers:
#   - Manually (workflow_dispatch) with an optional ATS dry-run URL and an
#     optional, separately-gated confirm_destroy phrase for the P1-7 drill.
#   - Weekly on Sunday at 02:00 UTC to keep the integration proofs green (the
#     destroy drill NEVER runs on the schedule — dispatch-only, see below).
on:
  workflow_dispatch:
    inputs:
      ats_dry_run_url:
        description: "Live ATS URL to dry-run pre-fill against (stops at review boundary; leave blank to skip)"
        required: false
        default: ""
      confirm_destroy:
        description: "P1-7 destroy drill (backup -> wipe named volumes -> restore) against an ISOLATED throwaway compose stack. Type exactly: yes-i-mean-it to run it. Leave blank to skip — never runs on the weekly schedule."
        required: false
        default: ""
  schedule:
    - cron: "0 2 * * 0"   # weekly Sunday 02:00 UTC

concurrency:
  group: ci-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    # Runs on the self-hosted runner. The `self-hosted` label matches yours
    # regardless of OS/arch. This lane needs heavy system deps (TeX,
    # LibreOffice, Xvfb, a browser) and Docker service containers — because
    # the runner has NO passwordless sudo, those system deps must be
    # PRE-BAKED on the runner host (this is also the speedup: no per-run apt
    # installs). The steps below verify them and fail fast with guidance if
    # any is missing, rather than installing.
    # Host prerequisites: Docker reachable without sudo (for the postgres
    # service container); TeX (lualatex or xelatex + moderncv/fontspec/
    # fontawesome5); LibreOffice with the Writer component (`soffice`,
    # `libreoffice-writer` — same package `docker/Dockerfile` bakes into the
    # deploy image, P2-10's docx render path); Xvfb (`xvfb-run`); fonts
    # (open-sans, font-awesome).
    #
    # HOSTED FALLBACK: to run this lane on GitHub-hosted instead (which permits
    # the `sudo apt-get` installs), comment the `self-hosted` line, uncomment
    # `ubuntu-latest`, and restore the apt install steps from git history.
    runs-on: self-hosted
    # runs-on: ubuntu-latest   # <-- hosted fallback: swap if the runner is down

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: applicant
          POSTGRES_PASSWORD: applicant
          POSTGRES_DB: applicant
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql+psycopg://applicant:applicant@localhost:5432/applicant"
      APPLICANT_ATS_DRY_RUN_URL: ${{ github.event.inputs.ats_dry_run_url || '' }}
      # P2-13 remainder: live board coverage confirmation. Non-destructive
      # (read-only searches against real job boards), so it is always-on for
      # this lane rather than gated behind its own confirm input — unlike the
      # P1-7 drill below, there is nothing here that can damage anything.
      DISCOVERY_LIVE_TEST: "1"
      # Optional: a real SearXNG instance to include in the live discovery
      # check. Blank is fine — the jobspy boards still run live without it;
      # set the SEARXNG_URL repo secret to also exercise the searxng client.
      SEARXNG_URL: ${{ secrets.SEARXNG_URL || '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false  # don't leave git creds on the self-hosted runner; no step pushes back (#167)

      # --- Python / engine --------------------------------------------------
      - name: Install uv (Python 3.11 toolchain)
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.11"

      - name: Sync dependencies (incl. browser extra for patchright + camoufox)
        run: uv sync --extra browser

      # --- TeX (FR-RESUME-3/4 real-render path; P2-10 LaTeX lane) ----------
      # No sudo on the self-hosted runner, so TeX must be PRE-BAKED on the host
      # (texlive-latex-extra/-luatex/-xetex/-fonts-* + moderncv/fontspec/
      # fontawesome5 + fonts-open-sans/-font-awesome). Verify, don't install.
      - name: Verify TeX is installed on the runner
        run: |
          if ! command -v lualatex >/dev/null && ! command -v xelatex >/dev/null; then
            echo "::error::No TeX engine (lualatex/xelatex) on the runner. Pre-bake TeX Live on the self-hosted host (no sudo in CI): apt-get install texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-luatex texlive-xetex fonts-open-sans fonts-font-awesome"
            exit 1
          fi
          lualatex --version || xelatex --version

      # --- LibreOffice (P2-10 docx-fallback render path) --------------------
      # Same reasoning as TeX: no sudo in CI, so the FULL LibreOffice Writer
      # component must be PRE-BAKED on the host (`apt-get install
      # libreoffice-writer`, the same package docker/Dockerfile installs in
      # the deploy image). `soffice` alone (libreoffice-core) is not enough —
      # DocxTailor's real convert needs the Writer component, and a bare
      # `soffice --version` can succeed even when it's missing, so this only
      # verifies the binary is reachable; the parseability proof test itself
      # (tests/integration/test_ats_parseability_proof.py) is what proves the
      # Writer component actually converts (it self-skips honestly rather
      # than false-passing when the real convert fails).
      - name: Verify LibreOffice (soffice) is installed on the runner
        run: |
          if ! command -v soffice >/dev/null; then
            echo "::error::soffice not found on the runner. Pre-bake LibreOffice on the self-hosted host (no sudo in CI): apt-get install libreoffice-writer"
            exit 1
          fi
          soffice --version

      # --- Browser binaries (FR-PREFILL / FR-STEALTH) -----------------------
      # patchright/camoufox install into uv's cache (user-space, no sudo) and
      # persist between runs on the self-hosted host. Xvfb must be pre-baked
      # (needs sudo to apt-install), so verify it rather than install.
      - name: Install Chromium via patchright
        run: uv run patchright install chromium
      - name: Fetch Camoufox (default stealth engine; P1-2 stealth-stack leg)
        run: uv run camoufox fetch
      - name: Verify Xvfb is installed on the runner
        run: |
          if ! command -v xvfb-run >/dev/null; then
            echo "::error::xvfb-run not found on the runner. Pre-bake it on the self-hosted host (no sudo in CI): apt-get install xvfb"
            exit 1
          fi

      # --- Database schema --------------------------------------------------
      - name: Apply Alembic migrations
        run: uv run alembic upgrade head

      # --- Integration suite ------------------------------------------------
      - name: Engine boot smoke (with real Postgres)
        run: uv run python -c "from applicant.app.main import app"

      - name: Integration test suite
        run: |
          # Wrap in Xvfb so browser tests can open a display.
          xvfb-run --auto-servernum uv run pytest -v -m integration \
            --tb=short \
            --junitxml=reports/integration-results.xml \
            2>&1 | tee reports/integration.log
        env:
          APPLICANT_ATS_DRY_RUN_URL: ${{ github.event.inputs.ats_dry_run_url || '' }}
          DISPLAY: ":99"

      # --- Artifact collection (rendered-PDF + state trace) -----------------
      - name: Collect rendered PDFs
        if: always()
        run: |
          mkdir -p artifacts
          # LatexTailor/DocxTailor write to a tmp dir; integration tests that
          # parameterize output_dir=tmp_path produce PDFs under pytest's tmp root.
          find /tmp -name '*.pdf' -newer pyproject.toml 2>/dev/null \
            | head -20 | xargs -I{} cp {} artifacts/ 2>/dev/null || true
          echo "PDFs collected: $(ls artifacts/*.pdf 2>/dev/null | wc -l)"

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts-${{ github.run_number }}
          path: |
            artifacts/
            reports/
          retention-days: 30

      # --- ATS dry-run summary ---------------------------------------------
      - name: ATS dry-run result summary
        if: always()
        env:
          # Route the workflow_dispatch input through env, never interpolate it
          # directly into the shell — avoids template/script injection (#156).
          ATS_DRY_RUN_URL: ${{ github.event.inputs.ats_dry_run_url }}
        run: |
          if [ -n "$ATS_DRY_RUN_URL" ]; then
            echo "ATS dry-run URL: $ATS_DRY_RUN_URL"
            grep -E "test_ats_prefill_dryrun|PASSED|FAILED|SKIPPED" reports/integration.log \
              | head -20 || true
          else
            echo "No ATS dry-run URL provided — live ATS test skipped."
          fi

      # --- P2-10 / P2-13 result summary --------------------------------------
      - name: Real-render + live-discovery result summary
        if: always()
        run: |
          echo "--- ATS-parseability proof (P2-10: TeX + LibreOffice real render) ---"
          grep -i "parseability" reports/integration.log || echo "no test_ats_parseability_proof lines found"
          echo "--- Live discovery-board coverage (P2-13) ---"
          grep -i "discovery_live" reports/integration.log || echo "no test_discovery_live lines found"
          echo "--- Camoufox stealth stack (P1-2) ---"
          grep -i "camoufox" reports/integration.log || echo "no camoufox test lines found"

  # --- P1-7 remainder: the --confirm-destroy restore drill ------------------
  destroy-drill:
    # Dispatch-only (never on the weekly schedule) AND only when the operator
    # types the exact confirm_destroy phrase — a double gate on top of the
    # drill script's own --confirm-destroy flag. Runs the REAL
    # scripts/backup-restore-drill.sh against docker/docker-compose.prod.yml,
    # but in COMPLETE isolation from any real deployed stack on this host:
    #   - `COMPOSE_PROJECT_NAME` below is unique to this job. `docker compose`
    #     derives every container, network, and NAMED VOLUME (pgdata,
    #     engine-state, workspace-data, ...) from the project name, so this
    #     run can never see or wipe a real deployment's volumes even though it
    #     reuses the same compose file.
    #   - A throwaway `.env` (own random POSTGRES_PASSWORD, own APP_PORT) is
    #     pointed to via `APPLICANT_ENV_FILE` — the drill script and the
    #     `backup.sh`/`restore.sh` it calls all honor that override (see their
    #     headers), so the real deploy `.env` is never read or written.
    # The drill is torn down (`down -v`) at the end regardless of outcome so
    # no throwaway container/volume lingers on the shared runner host.
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    env:
      CONFIRM_DESTROY: ${{ github.event.inputs.confirm_destroy }}
      COMPOSE_PROJECT_NAME: applicant-ci-destroy-drill
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Gate on the exact confirm_destroy phrase
        id: gate
        run: |
          if [ "${CONFIRM_DESTROY}" = "yes-i-mean-it" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "confirm_destroy not set to the exact phrase — skipping the destroy drill (this is the default; nothing destructive runs)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Docker is reachable without sudo
        if: steps.gate.outputs.run == 'true'
        run: docker version

      - name: Build an isolated throwaway .env (own port + password, never the real deploy .env)
        if: steps.gate.outputs.run == 'true'
        run: |
          drill_dir="${RUNNER_TEMP}/applicant-destroy-drill"
          mkdir -p "${drill_dir}"
          {
            echo "APP_PORT=18080"
            echo "POSTGRES_PASSWORD=$(openssl rand -hex 16)"
            echo "APPLICANT_INTERNAL_TOKEN=$(openssl rand -hex 16)"
          } > "${drill_dir}/.env"
          echo "APPLICANT_ENV_FILE=${drill_dir}/.env" >> "$GITHUB_ENV"
          echo "APPLICANT_BACKUP_DIR=${drill_dir}/backups" >> "$GITHUB_ENV"

      - name: Run the backup -> destroy volumes -> restore drill (--confirm-destroy)
        if: steps.gate.outputs.run == 'true'
        run: scripts/backup-restore-drill.sh --confirm-destroy

      - name: Tear down the throwaway drill stack (always — leaves nothing behind)
        if: always() && steps.gate.outputs.run == 'true'
        run: docker compose -f docker/docker-compose.prod.yml down -v || true
