name: Integration Lane (NFR-OPS-1)

# Staged integration lane: runs the @pytest.mark.integration suite with real
# dependencies (Postgres, TeX, browser) and optionally a live ATS dry-run.
# Never performs a real final submit — the engine's review-before-submit gate
# stops all pre-fill runs at the review boundary.
#
# Triggers:
#   - Manually (workflow_dispatch) with an optional ATS dry-run URL.
#   - Weekly on Sunday at 02:00 UTC to keep the integration proofs green.
on:
  workflow_dispatch:
    inputs:
      ats_dry_run_url:
        description: "Live ATS URL to dry-run pre-fill against (stops at review boundary; leave blank to skip)"
        required: false
        default: ""
  schedule:
    - cron: "0 2 * * 0"   # weekly Sunday 02:00 UTC

concurrency:
  group: ci-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    # Runs on the self-hosted runner. The `self-hosted` label matches yours
    # regardless of OS/arch. This lane needs heavy system deps (TeX, Xvfb, a
    # browser) and Docker service containers — because the runner has NO
    # passwordless sudo, those system deps must be PRE-BAKED on the runner host
    # (this is also the speedup: no per-run apt installs). The steps below verify
    # them and fail fast with guidance if any is missing, rather than installing.
    # Host prerequisites: Docker reachable without sudo (for the postgres service
    # container); TeX (lualatex or xelatex + moderncv/fontspec/fontawesome5);
    # Xvfb (`xvfb-run`); fonts (open-sans, font-awesome).
    #
    # HOSTED FALLBACK: to run this lane on GitHub-hosted instead (which permits
    # the `sudo apt-get` installs), comment the `self-hosted` line, uncomment
    # `ubuntu-latest`, and restore the apt install steps from git history.
    runs-on: self-hosted
    # runs-on: ubuntu-latest   # <-- hosted fallback: swap if the runner is down

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: applicant
          POSTGRES_PASSWORD: applicant
          POSTGRES_DB: applicant
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql+psycopg://applicant:applicant@localhost:5432/applicant"
      APPLICANT_ATS_DRY_RUN_URL: ${{ github.event.inputs.ats_dry_run_url || '' }}

    steps:
      - uses: actions/checkout@v4

      # --- Python / engine --------------------------------------------------
      - name: Install uv (Python 3.11 toolchain)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies (incl. browser extra for patchright)
        run: uv sync --extra browser

      # --- TeX (FR-RESUME-3/4 real-render path) ----------------------------
      # No sudo on the self-hosted runner, so TeX must be PRE-BAKED on the host
      # (texlive-latex-extra/-luatex/-xetex/-fonts-* + moderncv/fontspec/
      # fontawesome5 + fonts-open-sans/-font-awesome). Verify, don't install.
      - name: Verify TeX is installed on the runner
        run: |
          if ! command -v lualatex >/dev/null && ! command -v xelatex >/dev/null; then
            echo "::error::No TeX engine (lualatex/xelatex) on the runner. Pre-bake TeX Live on the self-hosted host (no sudo in CI): apt-get install texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-luatex texlive-xetex fonts-open-sans fonts-font-awesome"
            exit 1
          fi
          lualatex --version || xelatex --version

      # --- Browser binary (FR-PREFILL / FR-STEALTH) -------------------------
      # patchright installs the browser into uv's cache (user-space, no sudo) and
      # persists between runs on the self-hosted host. Xvfb must be pre-baked
      # (needs sudo to apt-install), so verify it rather than install.
      - name: Install Chromium via patchright
        run: uv run patchright install chromium
      - name: Verify Xvfb is installed on the runner
        run: |
          if ! command -v xvfb-run >/dev/null; then
            echo "::error::xvfb-run not found on the runner. Pre-bake it on the self-hosted host (no sudo in CI): apt-get install xvfb"
            exit 1
          fi

      # --- Database schema --------------------------------------------------
      - name: Apply Alembic migrations
        run: uv run alembic upgrade head

      # --- Integration suite ------------------------------------------------
      - name: Engine boot smoke (with real Postgres)
        run: uv run python -c "from applicant.app.main import app"

      - name: Integration test suite
        run: |
          # Wrap in Xvfb so browser tests can open a display.
          xvfb-run --auto-servernum uv run pytest -v -m integration \
            --tb=short \
            --junitxml=reports/integration-results.xml \
            2>&1 | tee reports/integration.log
        env:
          APPLICANT_ATS_DRY_RUN_URL: ${{ github.event.inputs.ats_dry_run_url || '' }}
          DISPLAY: ":99"

      # --- Artifact collection (rendered-PDF + state trace) -----------------
      - name: Collect rendered PDFs
        if: always()
        run: |
          mkdir -p artifacts
          # LatexTailor writes to a tmp dir; integration tests that parameterize
          # output_dir=tmp_path produce PDFs under pytest's tmp root.
          find /tmp -name '*.pdf' -newer pyproject.toml 2>/dev/null \
            | head -20 | xargs -I{} cp {} artifacts/ 2>/dev/null || true
          echo "PDFs collected: $(ls artifacts/*.pdf 2>/dev/null | wc -l)"

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts-${{ github.run_number }}
          path: |
            artifacts/
            reports/
          retention-days: 30

      # --- ATS dry-run summary ---------------------------------------------
      - name: ATS dry-run result summary
        if: always()
        run: |
          if [ -n "${{ github.event.inputs.ats_dry_run_url }}" ]; then
            echo "ATS dry-run URL: ${{ github.event.inputs.ats_dry_run_url }}"
            grep -E "test_ats_prefill_dryrun|PASSED|FAILED|SKIPPED" reports/integration.log \
              | head -20 || true
          else
            echo "No ATS dry-run URL provided — live ATS test skipped."
          fi
