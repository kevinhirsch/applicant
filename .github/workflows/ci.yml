name: CI

# Gates every PR (and pushes to main) on the project's real invariants so the
# regressions we hit can't reach a deploy again: lint, engine tests, the
# front-door proxy tests, syntax of all workspace Python/JS, a single Alembic
# head, a valid production compose file, and the white-label codename denylist.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Runs on the self-hosted runner to speed up CI. The `self-hosted` label is
    # present on every self-hosted runner, so this matches yours regardless of
    # OS/arch (no risk of a label typo leaving the runner idle).
    # Host prerequisites (no sudo used by this job): Docker reachable without
    # sudo (runner user in the `docker` group) for the compose-config step; git.
    # uv/Python and Node are installed by the workflow steps below.
    #
    # HOSTED FALLBACK (#278): the GitHub-hosted runner is wired in as an ACTIVE
    # fallback, not left commented out, so a required PR check never queues
    # indefinitely when a self-hosted runner is offline. ``ubuntu-latest`` always
    # resolves to a GitHub-hosted runner; listing it here keeps the hosted lane
    # live. (To prefer a self-hosted runner when one is available, front the list
    # with its label, e.g. ``[self-hosted, ubuntu-latest]`` once that runner group
    # is registered — the hosted entry below stays as the guaranteed fallback.)
    runs-on:
      - ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false  # don't leave git creds on the self-hosted runner (#167)

      # --- White-label denylist -------------------------------------------------
      # The product is white-labeled as "Applicant"; no upstream-fork vendor/persona
      # codename may appear in shipped artifacts. This step is the single home of the
      # denylist (it excludes itself and lockfiles from the scan).
      # Internal harvest-audit planning docs are also excluded: their explicit purpose
      # is to analyze the upstream sources (e.g. orwell) BY NAME, so the codename is
      # required there and is not a shipped/user-facing string. These docs ship no
      # product copy and are reachable through no UI surface.
      #
      # Wave 3 addition — hermes-agent project reference:
      # "hermes" alone is NOT denylist'd because it is a legitimate model-family name
      # used throughout model catalogs, pricing tables, and llama.cpp API parameters
      # (--tool-call-parser hermes) — blocking it would require excluding nearly every
      # model-related file. The denylist targets "hermes-agent", the compound project
      # name, which has no legitimate use in shipped product code. The sanctioned
      # exceptions carry explicit attribution (spec/ADR/NOTICE, not UI text):
      #   • workspace/services/memory/skill_format.py  — module docstring credits the
      #     skills-file format pattern to hermes-agent (attribution comment, not UI text)
      #   • docs/spec/master-spec.md                   — FR-HARVEST-PROVIDER attribution
      #   • docs/traceability.md                       — harvest hardening matrix row
      #   • NOTICE                                     — MIT third-party attribution
      #   • docs/spec/computer-use.md                  — FR-CUA attribution (cua/Hermes)
      #   • docs/spec/agent-intelligence.md            — FR-MIND attribution (Hermes guts)
      #   • docs/adr/0005-computer-use-cua-driver.md   — ADR attribution
      #   • docs/adr/0006-agent-intelligence-port.md   — ADR attribution
      #
      # Vendor subtree carve-out (AZ0-1, D6, 2026-07-18): agent-zero/ is a byte-pristine
      # vendored subtree of agent0ai/agent-zero. Its upstream code legitimately contains
      # codenames (Agent Zero / A0 / agent0ai) in its own source and docs. Agent-zero/**
      # is excluded from the repo greps because white-label enforcement on the *shipped
      # surface* is asserted separately by the build-time branded-artifact check (AZ0-4),
      # which scans the branding staging artifact after the overlay is applied — not the
      # pristine vendored tree.
      - name: White-label codename denylist
        run: |
          # docs/design/hig/color-wells.md is a genuine false positive: Apple's own API
          # names UIColorWell / NSColorWell contain the substring "…(col)orwell…". It
          # carries no upstream codename, so it is excluded here like the hermes-agent
          # false positives below.
          # workspace/tests/test_landing_page_content.py is also a genuine false
          # positive: it defines the SAME denylist pattern (as a string literal) to
          # reuse this exact check as a page-specific regression guard on
          # landing.html — the pattern's own source text trips the repo-wide grep.
          if git grep -I -i -E 'firehouse|orwell|odysseus|smokey' \
               -- ':!.github' ':!*.lock' ':!uv.lock' ':!agent-zero/**' \
               ':!HARVEST-INVENTORY.md' ':!docs/HARVEST-*' ':!docs/APPLICANT-SURVIVAL-PLAN.md' \
               ':!docs/design/hig/color-wells.md' \
               ':!workspace/tests/test_landing_page_content.py' \
               ':!scripts/vendor-sync.sh' \
               ':!workspace/tests/test_applicant_activation_funnel_09.py' \
               ':!workspace/tests/test_applicant_mind_help_lens12.py' \
               ':!workspace/tests/test_applicant_remote_help_lens12.py' \
               ':!workspace/tests/test_applicant_debug_help_lens12.py' \
               ':!workspace/tests/test_applicant_gallery_intro_lens12.py' \
               ':!workspace/tests/test_applicant_copy_digest_lens02.py' \
               ':!workspace/tests/test_applicant_chat_polish_lens0102.py'; then
            echo "::error::Upstream-fork codename found above — white-label violation."
            exit 1
          fi
          if git grep -I -i -F 'hermes-agent' \
               -- ':!.github' ':!*.lock' ':!uv.lock' ':!agent-zero/**' \
               ':!HARVEST-INVENTORY.md' ':!docs/HARVEST-*' ':!docs/APPLICANT-SURVIVAL-PLAN.md' \
               ':!workspace/services/memory/skill_format.py' \
               ':!docs/spec/master-spec.md' \
               ':!docs/traceability.md' \
               ':!NOTICE' \
               ':!docs/spec/computer-use.md' \
               ':!docs/spec/agent-intelligence.md' \
               ':!docs/adr/0005-computer-use-cua-driver.md' \
               ':!docs/adr/0006-agent-intelligence-port.md' \
               ':!workspace/tests/test_applicant_mind_help_lens12.py' \
               ':!workspace/tests/test_applicant_remote_help_lens12.py' \
               ':!workspace/tests/test_applicant_gallery_intro_lens12.py' \
               ':!workspace/tests/test_applicant_copy_digest_lens02.py' \
               ':!workspace/tests/test_applicant_chat_polish_lens0102.py' \
               ':!scripts/vendor-sync.sh'; then
            echo "::error::hermes-agent project reference found above — white-label violation."
            exit 1
          fi
          echo "white-label clean"

      # AZ0-4: Branded-artifact fail-closed check
      - name: Branded-artifact check
        run: |
          set -euo pipefail
          DIR="${RUNNER_TEMP}/branded-check"
          rm -rf "$DIR" || true
          cp -r agent-zero "$DIR"
          bash scripts/apply-branding.sh "$DIR" || { echo '::error::Branding step errored'; exit 1; }
          [ -f "$DIR/webui/index.html" ] || { echo '::error::Artifact missing'; exit 1; }
          if grep -rn -i -E 'Agent Zero|agent0ai' "$DIR/webui" --include='*.html' --include='*.json' 2>&1 | grep -v node_modules/ | head -5; then
            echo '::error::Upstream identifier in branded artifact'
            exit 1
          fi
          echo 'branded artifact: clean'

      # --- Secret scanning (P1-0, #651) ------------------------------------------
      # Dependency-free (no external action/binary download) so it works whether
      # or not the runner has outbound network. Fails the build on anything that
      # looks like a real, live credential (provider API keys, GitHub/GitLab/Slack/
      # npm tokens, AWS access key ids, PEM private-key blocks). Genuine false
      # positives (a detector/denylist regex, a fixture-shaped fake key) are an
      # explicit, reasoned exclusion list inside the script itself — see
      # scripts/ci/secret_scan.py.
      - name: Secret scan (no committed credentials)
        run: python3 scripts/ci/secret_scan.py

      # --- Python / engine ------------------------------------------------------
      - name: Install uv (Python 3.12 toolchain)
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Architecture — import-linter layering contract (NFR-ARCH-1)
        run: uv run lint-imports

      - name: Engine boots (import smoke)
        run: uv run python -c "from applicant.app.main import app"

      - name: Single Alembic head
        run: |
          heads="$(uv run alembic heads 2>/dev/null | grep -c '(head)')"
          echo "alembic heads with (head): ${heads}"
          test "${heads}" -eq 1

      - name: Engine test suite
        run: uv run pytest -q

      - name: Front-door proxy tests (workspace ↔ engine)
        run: uv run pytest -q workspace/tests/test_applicant_*.py

      - name: Workspace Python compiles
        run: uv run python -m compileall -q workspace/app.py workspace/routes workspace/src workspace/core

      # --- Front-end JS syntax --------------------------------------------------
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Front-end JS syntax (node --check)
        run: |
          find workspace/static -name '*.js' -not -path '*/node_modules/*' -print0 \
            | xargs -0 -r -n1 node --check
      # Behavioral gate (not just syntax): runs the front-door JS unit suite via
      # the built-in node:test runner. The suite dynamically import()s real
      # front-door ES modules and asserts genuine facts, so a regression fails CI.
      - name: Front-door JS unit tests (npm test)
        working-directory: workspace
        run: npm test

      # --- Deploy artifact ------------------------------------------------------
      - name: Production compose validates
        run: |
          if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
            APP_PORT=8000 POSTGRES_PASSWORD=ci-validate \
              docker compose -f docker/docker-compose.prod.yml config >/dev/null
            echo "compose config valid (docker compose)"
          else
            echo "::warning::docker unavailable on this runner — validating compose YAML via PyYAML fallback"
            uv run python -c "import yaml; d=yaml.safe_load(open('docker/docker-compose.prod.yml')); assert d.get('services'), 'no services in compose'; print('compose YAML parses;', len(d['services']), 'services')"
          fi
