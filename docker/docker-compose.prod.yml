# Applicant — PRODUCTION stack (FR-INSTALL-1/2/3, NFR-ZEROCLI-1).
#
# NEW production variant — do NOT edit the base docker-compose.yml. Differences
# vs the base: secrets come from the environment (no hard-coded passwords),
# pinned restart policies, a named volume for DB backups (used by update.sh
# rollback), internal-only searxng (not published), and a healthcheck on the api.
#
# Stage 1 front-door topology: the vendored Applicant UI app (built from
# ``../workspace``) is the public entry on ${APP_PORT:-8000} -> container 7000.
# The Applicant ENGINE (``api``) is kept running but INTERNAL only — other
# services and the UI reach it at http://api:8000 (no host publish). The UI app
# brings its own ``chromadb`` and ``ntfy`` (copied from the workspace compose)
# and REUSES the existing internal ``searxng`` below (not duplicated).
#
# Validate with: docker compose -f docker/docker-compose.prod.yml config
# Bring up with:  scripts/install.sh --apply
services:
  # ---------------------------------------------------------------------------
  # Front-door UI (public entry). Built from the vendored workspace app's own
  # Dockerfile (serves uvicorn app:app on container port 7000). This is the host
  # port the user opens.
  # ---------------------------------------------------------------------------
  applicant-ui:
    build:
      context: ../workspace
      dockerfile: Dockerfile
    image: applicant/ui:latest
    # Build locally; never try to PULL this name from a registry (not published).
    pull_policy: build
    # Optional so `docker compose config` validates before the first install
    # writes the repo-root .env (install.sh persists DB creds + APP_URL there).
    env_file:
      - path: ../.env
        required: false
    environment:
      # In-network service wiring (overrides the app's localhost defaults).
      SEARXNG_INSTANCE: ${SEARXNG_INSTANCE:-http://searxng:8080}
      CHROMADB_HOST: ${CHROMADB_HOST:-chromadb}
      CHROMADB_PORT: ${CHROMADB_PORT:-8000}
      # Stage-2 bridge: where the front-door UI reaches the Applicant ENGINE
      # (the internal ``api`` service). The UI's engine client + feature layer
      # read this; default matches the in-network address exposed below.
      ENGINE_URL: ${ENGINE_URL:-http://api:8000}
      # Stage-2.5 reverse channel: the SHARED secret that authenticates the
      # engine's callbacks INTO this UI app's /api/applicant/internal/* routes.
      # Generated once by scripts/install.sh and persisted to the repo-root .env
      # so BOTH containers (here + api) read the same value. Empty => the internal
      # channel is DISABLED on this side (every callback rejected).
      APPLICANT_INTERNAL_TOKEN: ${APPLICANT_INTERNAL_TOKEN:-}
      # Stage 1: the UI app keeps its OWN sqlite, persisted on the data volume
      # below (separate from the engine's Postgres). A later stage may converge.
      DATABASE_URL: ${UI_DATABASE_URL:-sqlite:///./data/app.db}
      # User/group the container drops to (it chowns the bind/named data + logs).
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ui-data:/app/data
      - ui-logs:/app/logs
    extra_hosts:
      # Lets the container reach local services on the Docker host (e.g. a host
      # Ollama at http://host.docker.internal:11434).
      - "host.docker.internal:host-gateway"
    ports:
      # Public front door: take over the main host port -> UI container 7000.
      - "${APP_PORT:-8000}:7000"
    depends_on:
      searxng:
        condition: service_healthy
      chromadb:
        condition: service_started
      # Wait for the engine to report a REAL healthy /healthz (DB reachable) before
      # the public front door starts serving — closes the window where the UI is up
      # but the engine it proxies to is not yet ready.
      api:
        condition: service_healthy
    healthcheck:
      # Auth-exempt liveness endpoint on the UI app (returns {"status":"healthy"}).
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7000/api/health', timeout=5).status==200 else 1)\""]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 40s
    restart: always

  # ---------------------------------------------------------------------------
  # Applicant ENGINE — kept running but INTERNAL only (no host publish). The UI
  # and other services reach it at http://api:8000. Its surfaces under /static
  # stay reachable in-network for the next migration stage.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: applicant/api:latest
    # Build locally; never try to PULL this name from a registry (it is not published).
    # Without this, `docker compose up` fails with "pull access denied for applicant/api".
    pull_policy: build
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-applicant}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (install.sh/proxmox-deploy.sh generate a strong one)}@postgres:5432/${POSTGRES_DB:-applicant}
      APP_STATIC_DIR: frontend/static
      # Credential vault master key (FR-VAULT-3). MUST live on a PERSISTED volume:
      # the container layer is ephemeral, so a key written there is regenerated on
      # every `up --build` and ALL previously sealed secrets become permanently
      # undecryptable. Point it at the ``secrets`` named volume mounted below.
      CREDENTIAL_KEYFILE: ${CREDENTIAL_KEYFILE:-/data/secrets/master.key}
      # Runtime font installs (FR-FONT-1/2) — persist on a named volume so installed
      # fonts survive container recreation instead of being lost on every update.
      FONTS_DIR: ${FONTS_DIR:-/data/fonts}
      ORCHESTRATOR_BACKEND: ${ORCHESTRATOR_BACKEND:-shim}
      # FR-INSTALL-3/FR-DUR-3: the default ``shim`` backend persists durable
      # workflow + mailbox state to CHECKPOINT_DIR. Point it at a stable path backed
      # by a named volume (below) so checkpoint state survives container recreation
      # on `up`/recreate. (Set ORCHESTRATOR_BACKEND=dbos to co-reside state in PG.)
      CHECKPOINT_DIR: ${CHECKPOINT_DIR:-/data/checkpoints}
      # FR-STEALTH-3: persist signed-in browser sessions (Workday/Google cookies) on a
      # named volume so the user signs in once and the session survives container
      # recreation — reused across applications instead of re-prompting each time.
      BROWSER_PROFILES_DIR: ${BROWSER_PROFILES_DIR:-/data/profiles}
      # 24/7 scheduler ON in prod: ticks each campaign's run loop, delivers the
      # daily digest, and advances the notification escalation ladder (NFR-247-1).
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      # Real production paths ON (OFF by default in config.py / the test lane):
      # live job-board discovery (FR-DISC-4), real notification send over Discord/
      # SMTP (FR-NOTIF-1), and the wired internal SearXNG metasearch (FR-DISC-2).
      DISCOVERY_LIVE: ${DISCOVERY_LIVE:-true}
      NOTIFICATIONS_LIVE: ${NOTIFICATIONS_LIVE:-true}
      # Drive a REAL browser for pre-fill (FR-PREFILL-1/2). Default OFF in config.py
      # so CI/tests stay browserless; ON here so the api container actually launches
      # the browser baked into the image and pre-fills live ATS pages. Without this
      # the engine would only SIMULATE pre-fill.
      BROWSER_REAL: ${BROWSER_REAL:-true}
      # Browser ENGINE every outbound automation request routes through (FR-STEALTH-1):
      # camoufox (default — the Firefox anti-detect browser fetched into the image) or
      # chromium (the patchright + real Chrome fallback / Proxmox CDP backend).
      BROWSER_ENGINE: ${BROWSER_ENGINE:-camoufox}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      # Stage-2.5 reverse channel: where the engine reaches the front-door UI to
      # call BACK (calendar/research/local-models), plus the SHARED secret it
      # presents. Same token as applicant-ui above; generated/persisted by
      # scripts/install.sh. Empty token => the engine's WorkspacePort.available()
      # is False and callers degrade gracefully (no callback attempted).
      WORKSPACE_URL: http://applicant-ui:7000
      APPLICANT_INTERNAL_TOKEN: ${APPLICANT_INTERNAL_TOKEN:-}
      # Assistant learning & memory substrate (docs/spec/agent-intelligence.md).
      # Defaults match config.py: the self-contained in-process store, self-writes
      # staged for review, background review OFF (ships dormant until wired). Set
      # MIND_BACKEND=bridge to read the front-door memory/playbooks store over the
      # internal callback channel (needs APPLICANT_INTERNAL_TOKEN above).
      MIND_BACKEND: ${MIND_BACKEND:-in_memory}
      MEMORY_WRITE_APPROVAL: ${MEMORY_WRITE_APPROVAL:-true}
      SKILLS_WRITE_APPROVAL: ${SKILLS_WRITE_APPROVAL:-true}
      MEMORY_MAX_CHARS: ${MEMORY_MAX_CHARS:-8000}
      USER_MAX_CHARS: ${USER_MAX_CHARS:-4000}
      CURATION_SCHEDULE: ${CURATION_SCHEDULE:-off}
      CURATION_MODEL: ${CURATION_MODEL:-}
      # Proactive-notification cadences (off/daily), dormant by default — parity with
      # CURATION_SCHEDULE so the Settings controls actually take effect in prod.
      ESSENTIALS_NUDGE_SCHEDULE: ${ESSENTIALS_NUDGE_SCHEDULE:-off}
      STATUS_UPDATE_SCHEDULE: ${STATUS_UPDATE_SCHEDULE:-off}
      # Desktop assist / computer use (docs/spec/computer-use.md). Defaults match
      # config.py: the no-side-effects backend, per-action approval, telemetry off.
      # Ships present-but-grayed until the desktop driver is baked into the SANDBOX
      # image (not this api image) — same "bake it in or it silently degrades" rule
      # as TeX/LibreOffice/Chrome.
      COMPUTER_USE_BACKEND: ${COMPUTER_USE_BACKEND:-noop}
      CUA_DRIVER_CMD: ${CUA_DRIVER_CMD:-}
      COMPUTER_USE_MODE: ${COMPUTER_USE_MODE:-som}
      COMPUTER_USE_APPROVALS: ${COMPUTER_USE_APPROVALS:-manual}
      CUA_TELEMETRY: ${CUA_TELEMETRY:-false}
      LOG_FORMAT: json
    # INTERNAL ONLY — no host publish. The front-door UI and sibling services
    # reach the engine in-network at http://api:8000.
    expose:
      - "8000"
    volumes:
      # Durable checkpoint store for the shim backend (FR-INSTALL-3/FR-DUR-3):
      # survives container recreation so approvals/in-flight workflows are not lost.
      - checkpoints:/data/checkpoints
      # Credential vault master key (FR-VAULT-3): persisted so the key — and thus the
      # ability to decrypt every sealed credential — survives `up --build`/recreate.
      - secrets:/data/secrets
      # Runtime-installed fonts (FR-FONT-1/2): persisted across container recreation.
      - fonts:/data/fonts
      # Signed-in browser sessions (FR-STEALTH-3): persisted so a one-time sign-in is
      # reused across applications and survives recreation.
      - browser-profiles:/data/profiles
      # In-UI Update button control plane (FR-OOBE-4): the api drops a request flag
      # here and reads the updater sidecar's status/log. Shared with the `updater`
      # service below. UPDATE_CONTROL_DIR (default /control) points the engine at it.
      - update-control:/control
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-applicant}
      # No weak default: a missing password aborts compose loudly instead of baking a
      # guessable one into the data volume on first init. install.sh / proxmox-deploy.sh
      # generate a strong value and persist it to .env.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (install.sh/proxmox-deploy.sh generate a strong one)}
      POSTGRES_DB: ${POSTGRES_DB:-applicant}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgbackups:/backups
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-applicant} -d ${POSTGRES_DB:-applicant}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # Takeover desktop (FR-SANDBOX-2/3, FR-PREFILL-5): a containerized, web-streamed
  # FULL Ubuntu desktop the human drives during an irreducible step (CAPTCHA /
  # verification / final submit). Every DE ships REAL Google Chrome (FR-STEALTH-1)
  # so the human takes over the SAME Chrome the engine drives (genuine Chrome
  # TLS/JA3 + correct Sec-CH-UA client hints — the coherent real-Linux/Chrome
  # identity). The DE is an image SWAP — set TAKEOVER_DESKTOP_IMAGE to the resolved
  # image for the configured DE (build these locally; stock webtops have no Chrome):
  #   cinnamon (default) -> applicant/webtop-chrome:cinnamon (docker/webtop-chrome, BASE=...cinnamon)
  #   xfce               -> applicant/webtop-chrome:xfce     (docker/webtop-chrome, BASE=...xfce)
  #   gnome              -> applicant/webtop-gnome:latest     (custom; build docker/webtop-gnome)
  #   pantheon           -> applicant/webtop-pantheon:latest  (custom; build docker/webtop-pantheon)
  # All run on X11 (not Wayland) for browser streaming + automation. Disabled by
  # default (profile: takeover); enable with `--profile takeover` once a desktop is wanted.
  takeover-desktop:
    profiles: ["takeover"]
    image: ${TAKEOVER_DESKTOP_IMAGE:-applicant/webtop-chrome:cinnamon}
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ:-Etc/UTC}
      TITLE: "Applicant — takeover desktop"
    # Desktop images need a large /dev/shm (browser + DE) and the security/sysctl bits
    # the webtop/KasmVNC stack expects; expose the web stream on 3000.
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    expose:
      - "3000"
    # Publish the web stream to the host so the human can actually reach the takeover
    # desktop. Only takes effect under `--profile takeover` (the service itself is
    # gated to that profile), so the port is not opened in the default stack.
    ports:
      - "${TAKEOVER_PORT:-3001}:3000"
    restart: unless-stopped

  # Internal-only search backend (not published to the host in prod). Shared by
  # BOTH the engine (SEARXNG_URL) and the front-door UI (SEARXNG_INSTANCE).
  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5).read(1)\""]
      interval: 5s
      timeout: 6s
      retries: 20
      start_period: 10s
    restart: always

  # ---------------------------------------------------------------------------
  # ChromaDB vector store for the UI app (copied from the workspace compose).
  # Internal only in prod — the UI reaches it at chromadb:8000.
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
    expose:
      - "8000"
    volumes:
      - chromadb-data:/chroma/chroma
    restart: always

  # ---------------------------------------------------------------------------
  # ntfy push notifications for the UI app (copied from the workspace compose).
  # Internal only in prod (reachable in-network at ntfy:80). Publish it via a
  # reverse proxy if external push is wanted.
  # ---------------------------------------------------------------------------
  ntfy:
    image: binwiederhier/ntfy
    command: serve
    environment:
      NTFY_BASE_URL: ${NTFY_BASE_URL:-http://ntfy}
    expose:
      - "80"
    volumes:
      - ntfy-cache:/var/cache/ntfy
    restart: always

  # ---------------------------------------------------------------------------
  # Updater sidecar (FR-OOBE-4, NFR-ZEROCLI-1) — powers the in-UI "Update" button.
  # It has the Docker socket + the host repo bind-mounted, so when the api drops a
  # request flag in the shared `update-control` volume it runs the normal
  # scripts/update.sh --apply against the HOST Docker (rebuild → migrate → restart).
  # It survives the rebuild because the update only recreates api + applicant-ui.
  #
  # SECURITY: mounting /var/run/docker.sock grants this container root-equivalent
  # control of the host Docker. That is the whole point (it rebuilds the stack),
  # which is why the image is intentionally minimal and runs only the watcher loop.
  # To opt out of one-click in-UI updates, comment this service out — the button
  # then degrades to "updater not deployed" and you update from the CLI as before.
  # ---------------------------------------------------------------------------
  updater:
    build:
      context: ..
      dockerfile: docker/updater.Dockerfile
    image: applicant/updater:latest
    pull_policy: build
    environment:
      UPDATE_CONTROL_DIR: /control
      APPLICANT_REPO_DIR_IN_CONTAINER: /repo
    volumes:
      # Drive the HOST Docker (rebuild/restart the stack) via the socket.
      - /var/run/docker.sock:/var/run/docker.sock
      # The host checkout (git + compose file + scripts + .env) update.sh runs from.
      # ABSOLUTE host path of this repo — install.sh/update.sh persist it to .env.
      - ${APPLICANT_REPO_DIR:-/opt/applicant}:/repo
      # Shared control plane with the api container (request flag + status + log).
      - update-control:/control
    restart: unless-stopped

  # Optional local LLM (uncomment to run fully local, NFR-LOCAL-1):
  # ollama:
  #   image: ollama/ollama:latest
  #   expose:
  #     - "11434"
  #   volumes:
  #     - ollama:/root/.ollama
  #   restart: always

volumes:
  pgdata:
  pgbackups:  # DB backups for update.sh rollback (FR-INSTALL-2)
  checkpoints:  # durable shim checkpoint/mailbox state (FR-INSTALL-3/FR-DUR-3)
  secrets:       # credential vault master key (FR-VAULT-3) — MUST persist across update
  fonts:         # runtime-installed fonts (FR-FONT-1/2) — persist across update
  browser-profiles:  # signed-in browser sessions (FR-STEALTH-3) — persist across update
  ui-data:       # front-door UI app data (its own sqlite, prefs, caches)
  ui-logs:       # front-door UI app logs
  chromadb-data: # UI vector store
  ntfy-cache:    # ntfy message cache
  update-control:  # in-UI Update control plane (FR-OOBE-4) — shared api <-> updater
  # ollama:
