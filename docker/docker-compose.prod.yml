# Applicant — PRODUCTION stack (FR-INSTALL-1/2/3, NFR-ZEROCLI-1).
#
# NEW production variant — do NOT edit the base docker-compose.yml. Differences
# vs the base: secrets come from the environment (no hard-coded passwords),
# pinned restart policies, a named volume for DB backups (used by update.sh
# rollback), internal-only searxng (not published), and a healthcheck on the api.
#
# Validate with: docker compose -f docker/docker-compose.prod.yml config
# Bring up with:  scripts/install.sh --apply
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: applicant/api:latest
    # Build locally; never try to PULL this name from a registry (it is not published).
    # Without this, `docker compose up` fails with "pull access denied for applicant/api".
    pull_policy: build
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-applicant}:${POSTGRES_PASSWORD:-applicant}@postgres:5432/${POSTGRES_DB:-applicant}
      APP_STATIC_DIR: frontend/static
      ORCHESTRATOR_BACKEND: ${ORCHESTRATOR_BACKEND:-shim}
      # FR-INSTALL-3/FR-DUR-3: the default ``shim`` backend persists durable
      # workflow + mailbox state to CHECKPOINT_DIR. Point it at a stable path backed
      # by a named volume (below) so checkpoint state survives container recreation
      # on `up`/recreate. (Set ORCHESTRATOR_BACKEND=dbos to co-reside state in PG.)
      CHECKPOINT_DIR: ${CHECKPOINT_DIR:-/data/checkpoints}
      # 24/7 scheduler ON in prod: ticks each campaign's run loop, delivers the
      # daily digest, and advances the notification escalation ladder (NFR-247-1).
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      # Real production paths ON (OFF by default in config.py / the test lane):
      # live job-board discovery (FR-DISC-4), real notification send over Discord/
      # SMTP (FR-NOTIF-1), and the wired internal SearXNG metasearch (FR-DISC-2).
      DISCOVERY_LIVE: ${DISCOVERY_LIVE:-true}
      NOTIFICATIONS_LIVE: ${NOTIFICATIONS_LIVE:-true}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      LOG_FORMAT: json
    ports:
      - "8000:8000"
    volumes:
      # Durable checkpoint store for the shim backend (FR-INSTALL-3/FR-DUR-3):
      # survives container recreation so approvals/in-flight workflows are not lost.
      - checkpoints:/data/checkpoints
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-applicant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-applicant}
      POSTGRES_DB: ${POSTGRES_DB:-applicant}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgbackups:/backups
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-applicant} -d ${POSTGRES_DB:-applicant}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # Takeover desktop (FR-SANDBOX-2/3, FR-PREFILL-5): a containerized, web-streamed
  # FULL Ubuntu desktop the human drives during an irreducible step (CAPTCHA /
  # verification / final submit). Every DE ships REAL Google Chrome (FR-STEALTH-1)
  # so the human takes over the SAME Chrome the engine drives (genuine Chrome
  # TLS/JA3 + correct Sec-CH-UA client hints — the coherent real-Linux/Chrome
  # identity). The DE is an image SWAP — set TAKEOVER_DESKTOP_IMAGE to the resolved
  # image for the configured DE (build these locally; stock webtops have no Chrome):
  #   cinnamon (default) -> applicant/webtop-chrome:cinnamon (docker/webtop-chrome, BASE=...cinnamon)
  #   xfce               -> applicant/webtop-chrome:xfce     (docker/webtop-chrome, BASE=...xfce)
  #   gnome              -> applicant/webtop-gnome:latest     (custom; build docker/webtop-gnome)
  # All run on X11 (not Wayland) for browser streaming + automation. Disabled by
  # default (profile: takeover); enable with `--profile takeover` once a desktop is wanted.
  takeover-desktop:
    profiles: ["takeover"]
    image: ${TAKEOVER_DESKTOP_IMAGE:-applicant/webtop-chrome:cinnamon}
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ:-Etc/UTC}
      TITLE: "Applicant — takeover desktop"
    # Desktop images need a large /dev/shm (browser + DE) and the security/sysctl bits
    # the webtop/KasmVNC stack expects; expose the web stream on 3000.
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    expose:
      - "3000"
    restart: unless-stopped

  # Internal-only search backend (not published to the host in prod).
  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    expose:
      - "8080"
    restart: always

  # Optional local LLM (uncomment to run fully local, NFR-LOCAL-1):
  # ollama:
  #   image: ollama/ollama:latest
  #   expose:
  #     - "11434"
  #   volumes:
  #     - ollama:/root/.ollama
  #   restart: always

volumes:
  pgdata:
  pgbackups:  # DB backups for update.sh rollback (FR-INSTALL-2)
  checkpoints:  # durable shim checkpoint/mailbox state (FR-INSTALL-3/FR-DUR-3)
  # ollama:
