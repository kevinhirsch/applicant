# Alembic configuration for Applicant.
# The actual DB URL is injected at runtime from settings (see alembic/env.py);
# the value below is only a placeholder so offline tooling can parse this file.

[alembic]
script_location = src/applicant/adapters/storage/alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+psycopg://applicant:applicant@localhost:5432/applicant

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
