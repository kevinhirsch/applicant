# migration_matrix.yaml — D15/D19 workspace-data migration CONTRACT
#
# This is the per-entity migration MATRIX that governs what moves from the
# workspace (front-door) to the engine (A0) and what NEVER migrates.
#
# RULE (D15): engine-owned state (applications, documents/redlines,
# provenance, curation, attributes) is NEVER migrated — it stays in the
# applicant engine as the single source of truth.
#
# RULE (D19): job-search-relevant workspace memories go via the
# CURATION-GATED import pathway (not a direct copy), so the curation
# ledger filters what enters the engine mind.
#
# The executable migration (dry-run on a data copy, backup, per-slice
# fidelity counts) is a SEPARATE gated step governed by this contract.

migrates:
  - source_entity: sessions
    target_system: A0 history
    mechanism: direct
    description: "General chat sessions (workspace `sessions` + `chat_messages` tables) migrate to A0 conversation history"

  - source_entity: documents
    target_system: A0 canvas files
    mechanism: direct
    description: "General personal documents/notes (workspace `documents` table) migrate to A0 canvas files"

  - source_entity: notes
    target_system: A0 canvas files
    mechanism: direct
    description: "Google Keep-style notes/checklists (workspace `notes` table) migrate to A0 canvas files"

  - source_entity: memory_entries
    target_system: A0 memory
    mechanism: direct
    description: "General workspace memory entries (non-job-search) migrate to A0 memory store"

  - source_entity: skills
    target_system: A0 memory
    mechanism: direct
    description: "General workspace skill definitions migrate to A0 skill store"

  - source_entity: job_search_memories
    target_system: Engine mind
    mechanism: curation-gated
    description: "Job-search-relevant workspace memories go via the curation-gated import (D19) — NOT a direct copy; the curation ledger filters what enters the engine mind"

never_migrates:
  - entity: applications
    reason: "Engine-owned truth (D15) — Application entity in src/applicant/core/entities/application.py; the application lifecycle, status machine, and submission state are engine-authoritative"

  - entity: generated_documents
    reason: "Engine-owned truth (D15) — GeneratedDocument entity covers resumes, cover letters, screening answers with redline state; engine owns document generation and approval"

  - entity: provenance
    reason: "Engine-owned truth (D15) — LearnedProvenance/LineProvenance are advisory transparency records (FR-MIND-5/-11) generated by the engine's curation pipeline; they are not workspace content"

  - entity: curation
    reason: "Engine-owned truth (D15) — CurationLedger/CurationService are the engine's curation pipeline (FR-MIND-11); the curation gate is an engine concern that controls what memories/skills enter the engine mind"

  - entity: attributes
    reason: "Engine-owned truth (D15) — Attribute/AttributeStore entities (FR-ATTR-*) are per-campaign attribute clouds; values are campaign-scoped and engine-authoritative"
