<link rel="stylesheet" href="/plugins/applicant/webui/applicant-theme.css">
<!-- AZ2 Notifications — panel for viewing and managing notifications. Driven by the engine via the a0-applicant notifications proxy (action=list|seen|deliver_now). -->
<style>
  .anotifications{max-width:760px;margin:0 auto;padding:8px 4px;color:var(--color-text);font-family:inherit}
  .anotifications h1{font-size:1.5rem;margin:0 0 .25rem}
  .anotifications .err{background:var(--color-danger-bg,#fdecea);color:var(--color-danger-text,#9b1c1c);border-radius:8px;padding:8px 12px;font-size:.85rem;margin-top:.75rem}
  .anotifications .empty{text-align:center;padding:30px 10px;color:var(--color-text-secondary,#6b7683)}
  .anotifications .empty h2{font-size:1.2rem;margin:0 0 .3rem;color:var(--color-text)}
  .anotifications .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
  .anotifications .btn{padding:7px 14px;border-radius:8px;border:1px solid var(--color-border,#d8e0e6);background:var(--color-panel,#f2f5f7);color:var(--color-text);font:inherit;font-weight:600;cursor:pointer;font-size:.82rem}
  .anotifications .btn.primary{background:var(--color-primary,#2d7ff9);color:#fff;border-color:var(--color-primary,#2d7ff9)}
  .anotifications .btn:disabled{opacity:.5;cursor:not-allowed}
  .anotifications .loading{text-align:center;padding:30px;color:var(--color-text-secondary,#6b7683)}
  .anotifications .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--color-border,#d8e0e6);border-top-color:var(--color-primary,#2d7ff9);border-radius:50%;animation:anotifications-spin .6s linear infinite}
  @keyframes anotifications-spin{to{transform:rotate(360deg)}}
  .anotifications .item{background:var(--color-background,#fff);border:1px solid var(--color-border,#d8e0e6);border-radius:10px;padding:12px 14px;margin-bottom:8px}
  .anotifications .item .info{min-width:0}
  .anotifications .item .info .title{font-weight:600;font-size:.92rem}
  .anotifications .item .info .meta{font-size:.78rem;color:var(--color-text-secondary,#6b7683);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
  .anotifications .badge{font-size:.72rem;padding:2px 7px;border-radius:10px;background:var(--color-panel,#e9edf1);display:inline-block}
  .anotifications .badge.kind{border-radius:10px}
  .anotifications .seen-true{opacity:.6}
</style>

<div class="anotifications" x-data="notificationsPanel()">
  <h1>🔔 Notifications</h1>

  <div class="toolbar">
    <label><input type="checkbox" x-model="includeSeen" @change="refresh()"> Include seen</label>
    <button class="btn primary" @click="deliverNow()" :disabled="busy">Deliver now</button>
  </div>

  <div class="loading" x-show="loading"><div class="spinner"></div><br>Loading notifications…</div>

  <div class="err" x-show="fatalError" x-text="fatalError"></div>

  <template x-for="n in notifications" :key="n.id">
    <div class="item" x-bind:class="'seen-' + (n.seen ? 'true' : 'false')">
      <div class="info">
        <div class="title" x-text="n.title"></div>
        <div class="meta">
          <span x-text="n.body"></span>
          <span x-show="n.kind" class="badge kind" x-text="n.kind"></span>
          <span x-show="n.seen !== undefined" x-text="n.seen ? 'Seen' : 'Unseen'"></span>
          <span x-show="n.created_at" x-text="'at ' + n.created_at"></span>
        </div>
      </div>
      <button class="btn" @click="markSeen(n.id)" :disabled="busy" x-show="!n.seen">Mark seen</button>
    </div>
  </template>

  <div class="empty" x-show="!loading && !fatalError && count === 0">
    <h2>No notifications</h2>
  </div>
</div>

<script type="module">
  import { callJsonApi } from "/js/api.js";

  document.addEventListener("alpine:init", () => {
    window.Alpine.data("notificationsPanel", () => ({
      notifications: [],
      count: 0,
      loading: true,
      fatalError: "",
      busy: false,
      includeSeen: false,

      async init() {
        await this.load();
      },

      async load() {
        this.loading = true;
        this.fatalError = "";
        const r = await callJsonApi("notifications", { action: "list", include_seen: this.includeSeen });
        if (!r || !r.ok) {
          this.fatalError = (r && r.error) || "Couldn't reach the notifications engine.";
          this.notifications = [];
          this.count = 0;
        } else {
          this.notifications = (r.data && r.data.items) || [];
          this.count = (r.data && r.data.count) || 0;
        }
        this.loading = false;
      },

      async refresh() {
        await this.load();
      },

      async markSeen(id) {
        this.busy = true;
        await callJsonApi("notifications", { action: "seen", notification_id: id });
        this.busy = false;
        await this.load();
      },

      async deliverNow() {
        this.busy = true;
        const r = await callJsonApi("notifications", { action: "deliver_now" });
        if (r && r.ok && r.data) {
          alert(`Flushed ${r.data.count} notifications through ${(r.data.flushed||[]).join(", ")}`);
        } else {
          this.fatalError = (r && r.error) || "Deliver now failed.";
        }
        this.busy = false;
        await this.load();
      }
    }));
  });
</script>
