<link rel="stylesheet" href="/plugins/applicant/webui/applicant-theme.css">
<!-- AZ2 (#842) Screening-Answer Library panel — browse saved screening answers + generate new ones. Driven by the engine via the a0-applicant screening proxy (action=library|generate). -->
<style>
  .ascreening{max-width:760px;margin:0 auto;padding:8px 4px;color:var(--color-text);font-family:inherit}
  .ascreening h1{font-size:1.5rem;margin:0 0 .25rem}
  .ascreening .sub{color:var(--color-text-secondary,#6b7683);margin:0 0 1rem;font-size:.95rem}
  .ascreening .err{background:var(--color-danger-bg,#fdecea);color:var(--color-danger-text,#9b1c1c);border-radius:8px;padding:8px 12px;font-size:.85rem;margin-top:.75rem}
  .ascreening .empty{text-align:center;padding:30px 10px;color:var(--color-text-secondary,#6b7683)}
  .ascreening .empty h2{font-size:1.2rem;margin:0 0 .3rem;color:var(--color-text)}
  .ascreening .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
  .ascreening .btn{padding:7px 14px;border-radius:8px;border:1px solid var(--color-border,#d8e0e6);background:var(--color-panel,#f2f5f7);color:var(--color-text);font:inherit;font-weight:600;cursor:pointer;font-size:.82rem}
  .ascreening .btn.primary{background:var(--color-primary,#2d7ff9);color:#fff;border-color:var(--color-primary,#2d7ff9)}
  .ascreening .btn:disabled{opacity:.5;cursor:not-allowed}
  .ascreening .loading{text-align:center;padding:30px;color:var(--color-text-secondary,#6b7683)}
  .ascreening .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--color-border,#d8e0e6);border-top-color:var(--color-primary,#2d7ff9);border-radius:50%;animation:ascreening-spin .6s linear infinite}
  @keyframes ascreening-spin{to{transform:rotate(360deg)}}
  .ascreening .item{background:var(--color-background,#fff);border:1px solid var(--color-border,#d8e0e6);border-radius:10px;padding:12px 14px;margin-bottom:8px}
  .ascreening .item .info{min-width:0}
  .ascreening .item .info .question{font-weight:600;font-size:.92rem}
  .ascreening .item .info .answer{font-size:.82rem;color:var(--color-text-secondary,#6b7683);margin-top:4px}
  .ascreening .item .info .meta{font-size:.72rem;color:var(--color-text-secondary,#6b7683);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
  .ascreening .badge{font-size:.72rem;padding:2px 7px;border-radius:10px;background:var(--color-panel,#e9edf1);display:inline-block}
  .ascreening .generate-form{background:var(--color-background,#fff);border:1px solid var(--color-border,#d8e0e6);border-radius:10px;padding:14px;margin-bottom:12px}
  .ascreening .generate-form label{font-size:.82rem;font-weight:600;display:block;margin-bottom:4px}
  .ascreening .generate-form input,.ascreening .generate-form textarea{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--color-border,#d8e0e6);background:var(--color-background,#fff);color:var(--color-text);font:inherit;font-size:.85rem;box-sizing:border-box;margin-bottom:8px}
  .ascreening .generate-form textarea{min-height:60px;resize:vertical}
  .ascreening .generate-form .form-row{display:flex;gap:8px}
  .ascreening .generate-form .form-row input{flex:1}
</style>

<div class="ascreening" x-data="screeningPanel()">
  <h1>🔍 Screening Answers <button class="help-btn" onclick="window.openModal('/plugins/applicant/webui/help.html?surface=screening')" title="Help for screening">?</button></h1>
  <div class="sub" x-text="`${items.length} saved answer${items.length===1?'':'s'}`" x-show="!loading && !fatalError && items.length > 0"></div>

  <div class="toolbar">
    <select x-model="selectedCampaign" @change="loadLibrary()">
      <option value="">Loading campaigns…</option>
      <template x-for="c in campaigns" :key="c.id">
        <option x-bind:value="c.id" x-text="c.name"></option>
      </template>
    </select>
  </div>

  <div class="generate-form" x-show="!loading && !fatalError">
    <div class="form-row">
      <input type="text" x-model="genApplicationId" placeholder="Application ID…">
      <input type="text" x-model="genQuestion" placeholder="Question…" @keyup.enter="generateAnswer()">
    </div>
    <textarea x-model="genContext" placeholder="Context / true source (optional)…"></textarea>
    <button class="btn primary" @click="generateAnswer()" :disabled="busy || !genQuestion.trim()">Generate answer</button>
  </div>

  <div class="loading" x-show="loading"><div class="spinner"></div><br>Loading screening answers…</div>

  <div class="err" x-show="fatalError" x-text="fatalError"></div>

  <template x-for="item in items" :key="item.id || item.question">
    <div class="item">
      <div class="info">
        <div class="question" x-text="item.question"></div>
        <div class="answer" x-text="item.content"></div>
        <div class="meta">
          <span class="badge" x-text="item.type || ''"></span>
          <span x-text="item.approved ? 'Approved' : 'Pending'"></span>
        </div>
      </div>
    </div>
  </template>

  <div class="empty" x-show="!loading && !fatalError && items.length === 0">
    <h2>No screening answers yet</h2>
    <p>Select a campaign and use the form above to generate a screening answer.</p>
  </div>
</div>

<script>
  const _apiP = import("/js/api.js");
  const callJsonApi = async (...a) => (await _apiP).callJsonApi(...a);

  window.Alpine.data("screeningPanel", () => ({
    campaigns: [],
    selectedCampaign: "",
    items: [],
    loading: true,
    fatalError: "",
    busy: false,
    genApplicationId: "",
    genQuestion: "",
    genContext: "",

    async init() {
      await this.loadCampaigns();
    },

    async loadCampaigns() {
      const r = await callJsonApi("campaigns", {
        action: "list",
      });
      if (r && r.ok && r.data && r.data.campaigns) {
        this.campaigns = r.data.campaigns;
        if (this.campaigns.length > 0) {
          this.selectedCampaign = this.campaigns[0].id;
        }
      }
      await this.loadLibrary();
    },

    async loadLibrary() {
      this.loading = true;
      this.fatalError = "";
      const cid = this.selectedCampaign || "__system__";
      const r = await callJsonApi("screening", {
        action: "library",
        campaign_id: cid,
      });
      if (!r || !r.ok) {
        this.fatalError = (r && r.error) || "Couldn't reach the screening engine.";
        this.items = [];
      } else {
        this.items = (r.data && r.data.items) || [];
      }
      this.loading = false;
    },

    async generateAnswer() {
      if (!this.genQuestion.trim()) return;
      this.busy = true;
      this.fatalError = "";
      const body = {
        action: "generate",
        campaign_id: this.selectedCampaign || "__system__",
        application_id: this.genApplicationId.trim() || "__system__",
        question: this.genQuestion.trim(),
      };
      if (this.genContext.trim()) {
        body.true_source = this.genContext.trim();
      }
      const r = await callJsonApi("screening", body);
      if (!r || !r.ok) {
        this.fatalError = (r && r.error) || "Failed to generate screening answer.";
      }
      this.busy = false;
      this.genQuestion = "";
      this.genContext = "";
      await this.loadLibrary();
    },
  }));
</script>
