<!-- AZ3 (#840) Gallery — screenshots + generated materials per campaign. -->
<style>
  .agallery{max-width:760px;margin:0 auto;padding:8px 4px;color:var(--color-text);font-family:inherit}
  .agallery h1{font-size:1.5rem;margin:0 0 .25rem}
  .agallery .sub{color:var(--color-text-secondary,#6b7683);margin:0 0 1rem;font-size:.95rem}
  .agallery .err{background:var(--color-danger-bg,#fdecea);color:var(--color-danger-text,#9b1c1c);border-radius:8px;padding:8px 12px;font-size:.85rem;margin-top:.75rem}
  .agallery .empty{text-align:center;padding:30px 10px;color:var(--color-text-secondary,#6b7683)}
  .agallery .empty h2{font-size:1.2rem;margin:0 0 .3rem;color:var(--color-text)}
  .agallery .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
  .agallery .btn{padding:7px 14px;border-radius:8px;border:1px solid var(--color-border,#d8e0e6);background:var(--color-panel,#f2f5f7);color:var(--color-text);font:inherit;font-weight:600;cursor:pointer;font-size:.82rem}
  .agallery .btn.primary{background:var(--color-primary,#2d7ff9);color:#fff;border-color:var(--color-primary,#2d7ff9)}
  .agallery .btn:disabled{opacity:.5;cursor:not-allowed}
  .agallery .loading{text-align:center;padding:30px;color:var(--color-text-secondary,#6b7683)}
  .agallery .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--color-border,#d8e0e6);border-top-color:var(--color-primary,#2d7ff9);border-radius:50%;animation:agallery-spin .6s linear infinite}
  @keyframes agallery-spin{to{transform:rotate(360deg)}}
  .agallery .picker{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
  .agallery .picker select{flex:1;padding:7px 12px;border-radius:8px;border:1px solid var(--color-border,#d8e0e6);background:var(--color-background,#fff);color:var(--color-text);font:inherit;font-size:.85rem;max-width:100%}
  .agallery .section{margin-bottom:1.5rem}
  .agallery .section h2{font-size:1.15rem;margin:0 0 .5rem;display:flex;align-items:center;gap:8px}
  .agallery .section h2 .count{font-size:.8rem;font-weight:400;color:var(--color-text-secondary,#6b7683)}
  .agallery .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
  .agallery .item{background:var(--color-background,#fff);border:1px solid var(--color-border,#d8e0e6);border-radius:10px;padding:10px;overflow:hidden}
  .agallery .item .preview{font-size:.78rem;color:var(--color-text-secondary,#6b7683);word-break:break-all}
  .agallery .item .title{font-weight:600;font-size:.85rem;margin-bottom:4px;word-break:break-word}
  .agallery .item .meta{font-size:.75rem;color:var(--color-text-secondary,#6b7683)}
</style>

<div class="agallery" x-data="galleryPanel()">
  <h1>📸 Gallery</h1>

  <div class="loading" x-show="loading"><div class="spinner"></div><br>Loading…</div>

  <div class="err" x-show="fatalError" x-text="fatalError"></div>

  <div x-show="!loading && !fatalError">
    <div class="picker">
      <select x-model="selectedCampaignId" @change="loadGallery()">
        <option value="">Select a campaign…</option>
        <template x-for="c in campaigns" :key="c.id || c.name">
          <option x-bind:value="c.id || c.name" x-text="c.name || c.id || c"></option>
        </template>
      </select>
      <button class="btn" @click="loadGallery()" :disabled="!selectedCampaignId">↻ Refresh</button>
    </div>

    <div class="empty" x-show="campaigns.length === 0">
      <p>No campaigns available.</p>
    </div>

    <div x-show="selectedCampaignId">
      <!-- Screenshots -->
      <div class="section">
        <h2>🖼️ Screenshots <span class="count" x-text="'(' + (galleryData.screenshots?.count ?? 0) + ')'"></span></h2>
        <div class="grid" x-show="(galleryData.screenshots?.count ?? 0) > 0">
          <template x-for="item in (galleryData.screenshots?.items || [])" :key="item.page_ref || item.page_url || $index">
            <div class="item">
              <div class="title" x-text="item.page_ref || item.page_url || '(screenshot)'"></div>
              <div class="preview" x-text="item.page_url || ''"></div>
              <div class="meta" x-text="item.captured_at || ''"></div>
            </div>
          </template>
        </div>
        <div class="empty" x-show="(galleryData.screenshots?.count ?? 0) === 0">
          <p>No screenshots</p>
        </div>
      </div>

      <!-- Materials -->
      <div class="section">
        <h2>📄 Materials <span class="count" x-text="'(' + (galleryData.materials?.count ?? 0) + ')'"></span></h2>
        <div class="grid" x-show="(galleryData.materials?.count ?? 0) > 0">
          <template x-for="item in (galleryData.materials?.items || [])" :key="item.storage_path || item.type || $index">
            <div class="item">
              <div class="title" x-text="item.type || '(generated)'"></div>
              <div class="preview" x-text="item.storage_path || item.content?.substring(0, 80) || ''"></div>
              <div class="meta">
                <span x-show="item.approved !== undefined" x-text="item.approved ? '✅ Approved' : '⏳ Pending'"></span>
                <span x-show="item.generated_at" x-text="item.generated_at"></span>
              </div>
            </div>
          </template>
        </div>
        <div class="empty" x-show="(galleryData.materials?.count ?? 0) === 0">
          <p>No materials</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { callJsonApi } from "/js/api.js";

  document.addEventListener("alpine:init", () => {
    window.Alpine.data("galleryPanel", () => ({
      campaigns: [],
      selectedCampaignId: "",
      galleryData: {},
      loading: true,
      fatalError: "",

      async init() {
        this.loading = true;
        this.fatalError = "";
        const r = await callJsonApi("campaigns", { action: "list" });
        if (!r || !r.ok) {
          this.fatalError = (r && r.error) || "Couldn't reach the campaigns engine.";
          this.campaigns = [];
        } else {
          const items = (r.data && r.data.campaigns) || [];
          this.campaigns = items;
          if (items.length > 0) {
            this.selectedCampaignId = items[0].id || items[0].name || "__system__";
          } else {
            this.selectedCampaignId = "__system__";
          }
        }
        this.loading = false;
        if (this.selectedCampaignId) {
          await this.loadGallery();
        }
      },

      async loadGallery() {
        this.loading = true;
        this.fatalError = "";
        const cid = this.selectedCampaignId || "__system__";
        const r = await callJsonApi("gallery", { action: "view", campaign_id: cid });
        if (!r || !r.ok) {
          this.fatalError = (r && r.error) || "Couldn't reach the gallery engine.";
          this.galleryData = {};
        } else {
          this.galleryData = r.data || {};
        }
        this.loading = false;
      }
    }));
  });
</script>
