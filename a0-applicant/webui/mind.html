<link rel="stylesheet" href="/plugins/applicant/webui/applicant-theme.css">
<!-- AZ3 (#841) Mind — what the assistant remembers / saved playbooks / curation approvals. -->
<style>
  .amind{max-width:760px;margin:0 auto;padding:8px 4px;color:var(--color-text);font-family:inherit}
  .amind h1{font-size:1.5rem;margin:0 0 .25rem}
  .amind h2{font-size:1.1rem;margin:1rem 0 .25rem}
  .amind .err{background:var(--color-danger-bg,#fdecea);color:var(--color-danger-text,#9b1c1c);border-radius:8px;padding:8px 12px;font-size:.85rem;margin-top:.75rem}
  .amind .empty{text-align:center;padding:30px 10px;color:var(--color-text-secondary,#6b7683)}
  .amind .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
  .amind .tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid var(--color-border,#d8e0e6)}
  .amind .tabs .tab{padding:8px 16px;cursor:pointer;font-weight:600;font-size:.85rem;border-bottom:2px solid transparent;color:var(--color-text-secondary,#6b7683)}
  .amind .tabs .tab.active{border-bottom-color:var(--color-primary,#2d7ff9);color:var(--color-text)}
  .amind .btn{padding:7px 14px;border-radius:8px;border:1px solid var(--color-border,#d8e0e6);background:var(--color-panel,#f2f5f7);color:var(--color-text);font:inherit;font-weight:600;cursor:pointer;font-size:.82rem}
  .amind .btn.primary{background:var(--color-primary,#2d7ff9);color:#fff;border-color:var(--color-primary,#2d7ff9)}
  .amind .btn.danger{background:var(--color-danger-bg,#fdecea);color:var(--color-danger-text,#9b1c1c);border-color:var(--color-danger-text,#9b1c1c)}
  .amind .btn:disabled{opacity:.5;cursor:not-allowed}
  .amind .loading{text-align:center;padding:30px;color:var(--color-text-secondary,#6b7683)}
  .amind .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--color-border,#d8e0e6);border-top-color:var(--color-primary,#2d7ff9);border-radius:50%;animation:amind-spin .6s linear infinite}
  @keyframes amind-spin{to{transform:rotate(360deg)}}
  .amind .item{background:var(--color-background,#fff);border:1px solid var(--color-border,#d8e0e6);border-radius:10px;padding:12px 14px;margin-bottom:8px}
  .amind .item .info{flex:1;min-width:0}
  .amind .item .info .title{font-weight:600;font-size:.92rem}
  .amind .item .info .meta{font-size:.78rem;color:var(--color-text-secondary,#6b7683);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
  .amind .item .info .preview{font-size:.82rem;margin-top:4px;padding:4px 8px;background:var(--color-panel,#f2f5f7);border-radius:6px;color:var(--color-text-secondary,#6b7683)}
  .amind .item-actions{display:flex;gap:6px;margin-top:8px}
  .amind .badge{font-size:.72rem;padding:2px 7px;border-radius:10px;background:var(--color-panel,#e9edf1);display:inline-block}
  .amind .badge.env{background:#d4edda;color:#155724}
  .amind .badge.user{background:#cce5ff;color:#004085}
  .amind .section-label{font-size:.85rem;font-weight:600;margin:12px 0 6px;color:var(--color-text-secondary,#6b7683)}
</style>

<div class="amind" x-data="mindPanel()">
  <h1>🧠 Mind <button class="help-btn" onclick="window.openModal('/plugins/applicant/webui/help.html?surface=mind')" title="Help for mind">?</button></h1>

  <div class="tabs">
    <template x-for="tab in ['memory','skills','curation']" :key="tab">
      <div class="tab" x-bind:class="{ active: activeTab === tab }" @click="switchTab(tab)" x-text="tab.charAt(0).toUpperCase() + tab.slice(1)"></div>
    </template>
  </div>

  <div class="loading" x-show="loading"><div class="spinner"></div><br>Loading…</div>

  <div class="err" x-show="fatalError" x-text="fatalError"></div>

  <!-- Memory Tab -->
  <div x-show="activeTab === 'memory' && !loading">
    <template x-for="(section, key) in {environment: 'Environment', user: 'User'}" :key="key">
      <div>
        <div class="section-label" x-text="section"></div>
        <template x-for="item in (memoryData[key] || [])" :key="item.ref || item.text">
          <div class="item">
            <div class="info">
              <div class="title" x-text="item.text || '(no text)'"></div>
              <div class="meta">
                <span class="badge" x-bind:class="item.kind === 'env' ? 'env' : 'user'" x-text="item.kind || '?'"></span>
                <span x-show="item.scope" x-text="'scope: ' + item.scope"></span>
              </div>
            </div>
            <div class="item-actions">
              <button class="btn danger" @click="forgetItem(item)" :disabled="busy">Forget</button>
            </div>
          </div>
        </template>
        <div class="empty" x-show="(memoryData[key] || []).length === 0">
          <p x-text="'No ' + key + ' memories recorded yet.'"></p>
        </div>
      </div>
    </template>
  </div>

  <!-- Skills Tab -->
  <div x-show="activeTab === 'skills' && !loading">
    <template x-for="skill in skillsData" :key="skill.name">
      <div class="item">
        <div class="info">
          <div class="title" x-text="skill.name || '(unnamed)'"></div>
          <div class="meta" x-show="skill.description" x-text="skill.description"></div>
          <div class="meta">
            <span x-show="skill.when_to_use" x-text="'Use: ' + skill.when_to_use"></span>
            <span x-show="skill.version" x-text="'v' + skill.version"></span>
          </div>
        </div>
      </div>
    </template>
    <div class="empty" x-show="skillsData.length === 0">
      <p>No saved playbooks or skills yet.</p>
    </div>
  </div>

  <!-- Curation Tab -->
  <div x-show="activeTab === 'curation' && !loading">
    <div class="toolbar">
      <button class="btn" @click="loadCuration()" :disabled="busy">&#x21bb; Refresh</button>
    </div>
    <template x-for="proposal in curationData" :key="proposal.id">
      <div class="item">
        <div class="info">
          <div class="title" x-text="proposal.text || proposal.description || '(proposal)'"></div>
          <div class="meta" x-show="proposal.kind" x-text="'Kind: ' + proposal.kind"></div>
          <div class="preview" x-show="proposal.preview" x-text="proposal.preview"></div>
        </div>
        <div class="item-actions">
          <button class="btn primary" @click="approveProposal(proposal)" :disabled="busy">Approve</button>
        </div>
      </div>
    </template>
    <div class="empty" x-show="curationData.length === 0">
      <p>No pending curation proposals.</p>
    </div>
  </div>
</div>

<script>
  (() => {
  (() => {
  const _apiP = import("/js/api.js");
  const callJsonApi = async (...a) => (await _apiP).callJsonApi(...a);

  window.Alpine.data("mindPanel", () => ({
    activeTab: "memory",
    loading: true,
    fatalError: "",
    busy: false,
    memoryData: { environment: [], user: [] },
    skillsData: [],
    curationData: [],

    async init() {
      await this.loadMemory();
    },

    async switchTab(tab) {
      this.activeTab = tab;
      this.fatalError = "";
      if (tab === "memory" && this.memoryData.environment.length === 0 && this.memoryData.user.length === 0) await this.loadMemory();
      if (tab === "skills" && this.skillsData.length === 0) await this.loadSkills();
      if (tab === "curation" && this.curationData.length === 0) await this.loadCuration();
    },

    async loadMemory() {
      this.loading = true;
      this.fatalError = "";
      const r = await callJsonApi("mind", { action: "memory" });
      if (!r || !r.ok) {
        this.fatalError = (r && r.error) || "Couldn't reach the memory engine.";
        this.memoryData = { environment: [], user: [] };
      } else {
        this.memoryData = {
          environment: (r.data && r.data.environment) || [],
          user: (r.data && r.data.user) || [],
        };
      }
      this.loading = false;
    },

    async loadSkills() {
      this.loading = true;
      this.fatalError = "";
      const r = await callJsonApi("mind", { action: "skills" });
      if (!r || !r.ok) {
        this.fatalError = (r && r.error) || "Couldn't reach the skills engine.";
        this.skillsData = [];
      } else {
        this.skillsData = (r.data && r.data.items) || [];
      }
      this.loading = false;
    },

    async loadCuration() {
      this.loading = true;
      this.fatalError = "";
      const r = await callJsonApi("mind", { action: "curation" });
      if (!r || !r.ok) {
        this.fatalError = (r && r.error) || "Couldn't reach the curation engine.";
        this.curationData = [];
      } else {
        this.curationData = (r.data && r.data.items) || [];
      }
      this.loading = false;
    },

    async approveProposal(proposal) {
      this.busy = true;
      this.fatalError = "";
      const r = await callJsonApi("mind", { action: "approve", proposal_id: proposal.id });
      if (!r || !r.ok) {
        this.fatalError = (r && r.error) || "Failed to approve.";
      }
      this.busy = false;
      await this.loadCuration();
    },

    async forgetItem(item) {
      this.busy = true;
      this.fatalError = "";
      const r = await callJsonApi("mind", { action: "forget", ref: item.ref, text: item.text, scope: item.scope, campaign_id: item.campaign_id });
      if (!r || !r.ok) {
        this.fatalError = (r && r.error) || "Failed to forget.";
      }
      this.busy = false;
      await this.loadMemory();
    }
  }));
  })();
  })();
</script>
